#       - "4400:4400"  # WebUI
#       - "6600:6600"  # HLS (example)
#       - "6800:6800"  # Proxy (example)
#     environment:
#       - STALKERHEK_PROFILES_FILE=/data/profiles.json
#       - STALKERHEK_AUTH_FILE=/data/auth.json
